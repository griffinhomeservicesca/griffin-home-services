const { useState, useEffect, useRef, useCallback } = React;

/* ── palette ── */
const FG = "#1a1a18";
const PAPER = "#f0ebe3";
const LINEN = "#e8e2d8";
const GREEN = "#2d4a3e";
const GREENL = "#3d6354";
const TERRA = "#c17f5a";
const TERRAL = "#d49572";
const TAUPE = "#b5a898";
const MUTE = "#8a8279";

/* ── helpers ── */
function useVis(th=0.1){const r=useRef(null);const[v,s]=useState(false);useEffect(()=>{const el=r.current;if(!el)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)s(true)},{threshold:th});o.observe(el);return()=>o.disconnect()},[th]);return[r,v]}
function Rv({children,d=0,from="up",style={}}){const[r,v]=useVis();const t={up:"translateY(60px)",down:"translateY(-60px)",left:"translateX(80px)",right:"translateX(-80px)",scale:"scale(0.92)",none:"none"};return<div ref={r} style={{...style,opacity:v?1:0,transform:v?"translate(0) scale(1)":t[from],transition:`all 1.1s cubic-bezier(0.22,1,0.36,1) ${d}s`}}>{children}</div>}
function CU({end,sfx=""}){const[c,setC]=useState(0);const[r,v]=useVis();const s=useRef(false);useEffect(()=>{if(!v||s.current)return;s.current=true;const st=Date.now();const tick=()=>{const p=Math.min((Date.now()-st)/2000,1);setC(Math.floor((1-Math.pow(1-p,3))*end));if(p<1)requestAnimationFrame(tick)};requestAnimationFrame(tick)},[v,end]);return<span ref={r}>{c}{sfx}</span>}

/* ── nav ── */
function Nav(){
  const[sc,setSc]=useState(false);
  const[mo,setMo]=useState(false);
  useEffect(()=>{const h=()=>setSc(window.scrollY>80);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h)},[]);
  const go=id=>{setMo(false);document.getElementById(id)?.scrollIntoView({behavior:"smooth"})};
  return<>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet"/>
    <nav style={{position:"fixed",top:0,left:0,right:0,zIndex:1000,background:sc?"rgba(240,235,227,0.92)":"transparent",backdropFilter:sc?"blur(24px)":"none",transition:"all 0.6s cubic-bezier(0.22,1,0.36,1)",padding:sc?"12px 0":"28px 0",borderBottom:sc?"1px solid rgba(45,74,62,0.08)":"1px solid transparent"}}>
      <div style={{maxWidth:1400,margin:"0 auto",padding:"0 48px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{cursor:"pointer"}} onClick={()=>go("hero")}>
          <img src={I_LOGO} alt="Griffin Home Services" style={{height:sc?56:68,width:"auto",objectFit:"contain",transition:"height 0.6s cubic-bezier(0.22,1,0.36,1)",filter:sc?"brightness(0.3)":"brightness(1)"}}/>
        </div>
        <div className="dsk-nav" style={{display:"flex",gap:40,alignItems:"center"}}>
          {["Work","Services","About","Contact"].map(i=><span key={i} onClick={()=>go(i.toLowerCase())} style={{color:sc?FG:"#fff",fontSize:12,letterSpacing:3,textTransform:"uppercase",cursor:"pointer",fontWeight:400,fontFamily:"'Outfit'",transition:"all 0.3s",opacity:0.7}} onMouseEnter={e=>{e.target.style.opacity=1;e.target.style.color=sc?GREEN:TERRA}} onMouseLeave={e=>{e.target.style.opacity=0.7;e.target.style.color=sc?FG:"#fff"}}>{i}</span>)}
          <button onClick={()=>go("contact")} style={{background:sc?GREEN:TERRA,color:"#fff",border:"none",padding:"12px 32px",fontSize:11,fontWeight:600,letterSpacing:2.5,textTransform:"uppercase",cursor:"pointer",fontFamily:"'Outfit'",borderRadius:100,transition:"all 0.4s"}} onMouseEnter={e=>e.target.style.transform="scale(1.05)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}>Free Consult</button>
        </div>
        <div className="mob-btn" style={{display:"none",cursor:"pointer",padding:8,zIndex:10}} onClick={()=>setMo(!mo)}>
          <div style={{width:28,height:2,background:sc?FG:"#fff",marginBottom:7,transition:"all 0.3s",transform:mo?"rotate(45deg) translate(5px,6px)":"none",borderRadius:2}}/>
          <div style={{width:28,height:2,background:sc?FG:"#fff",marginBottom:7,opacity:mo?0:1,transition:"all 0.3s",borderRadius:2}}/>
          <div style={{width:20,height:2,background:sc?GREEN:TERRA,transition:"all 0.3s",transform:mo?"rotate(-45deg) translate(6px,-7px)":"none",borderRadius:2,marginLeft:"auto",width:mo?28:20}}/>
        </div>
      </div>
      {mo&&<div style={{background:PAPER,padding:"32px 48px",display:"flex",flexDirection:"column",gap:24,borderTop:`1px solid ${LINEN}`}}>{["Work","Services","About","Contact"].map(i=><span key={i} onClick={()=>go(i.toLowerCase())} style={{color:FG,fontSize:14,letterSpacing:2,textTransform:"uppercase",cursor:"pointer",fontFamily:"'Outfit'"}}>{i}</span>)}</div>}
    </nav>
    <style>{`@media(max-width:768px){.dsk-nav{display:none!important}.mob-btn{display:block!important}}`}</style>
  </>
}

/* ── hero: split-screen ── */
function Hero(){
  const[ld,setLd]=useState(false);
  useEffect(()=>{setTimeout(()=>setLd(true),300)},[]);
  return<section id="hero" style={{position:"relative",minHeight:"100vh",overflow:"hidden",background:FG}}>
    {/* Full background image */}
    <div style={{position:"absolute",inset:0,backgroundImage:`url(${I_HERO})`,backgroundSize:"cover",backgroundPosition:"center 35%",transform:ld?"scale(1)":"scale(1.12)",opacity:ld?1:0,transition:"transform 16s cubic-bezier(0.22,1,0.36,1),opacity 2.5s ease"}}/>

  const[a,setA]=useState(0);
  useEffect(()=>{const iv=setInterval(()=>setA(p=>(p+1)%ts.length),6000);return()=>clearInterval(iv)},[]);
  return<section style={{background:LINEN,padding:"120px 48px"}}>
    <div style={{maxWidth:800,margin:"0 auto",textAlign:"center"}}>
      <Rv>
        <div style={{fontSize:11,color:TERRA,letterSpacing:5,textTransform:"uppercase",fontWeight:600,fontFamily:"'Outfit'",marginBottom:12}}>Testimonials</div>
        <h2 style={{color:FG,fontSize:"clamp(30px,4vw,48px)",fontWeight:300,fontFamily:"'Cormorant Garamond',serif",margin:"0 0 64px"}}>Kind words from <em style={{color:GREEN}}>our clients</em></h2>
      </Rv>
      <div style={{position:"relative",minHeight:200}}>
        {ts.map((t,i)=><div key={i} style={{position:i===a?"relative":"absolute",top:0,left:0,right:0,opacity:i===a?1:0,transform:i===a?"translateY(0)":"translateY(20px)",transition:"all 0.8s cubic-bezier(0.22,1,0.36,1)"}}>
          <div style={{color:TERRA,fontSize:16,letterSpacing:3,marginBottom:24}}>★★★★★</div>
          <p style={{color:FG,fontSize:"clamp(18px,2.2vw,24px)",fontFamily:"'Cormorant Garamond',serif",fontWeight:300,lineHeight:1.8,fontStyle:"italic",marginBottom:28}}>{t.t}</p>
          <div style={{color:GREEN,fontSize:13,fontWeight:600,fontFamily:"'Outfit'",letterSpacing:2,textTransform:"uppercase"}}>{t.n}</div>
          <div style={{color:TAUPE,fontSize:11,fontFamily:"'Outfit'",letterSpacing:2,marginTop:4}}>{t.l}, CA</div>
        </div>)}
      </div>
      <div style={{display:"flex",justifyContent:"center",gap:10,marginTop:48}}>
        {ts.map((_,i)=><button key={i} onClick={()=>setA(i)} style={{width:i===a?32:10,height:10,borderRadius:100,background:i===a?GREEN:`${TAUPE}44`,border:"none",cursor:"pointer",transition:"all 0.5s"}}/>)}
      </div>
    </div>
  </section>
}

          <div style={{display:"flex",flexDirection:"column",gap:24}}>

            <p style={{color:MUTE,fontSize:14,fontFamily:"'Outfit'"}}>We'll be in touch within 24 hours.</p>
          </div>
          :<div style={{background:"#fff",borderRadius:20,padding:"48px 44px",boxShadow:"0 8px 40px rgba(0,0,0,0.06)"}}>

      </div>
    </div>
    <style>{`@media(max-width:768px){.ct-g{grid-template-columns:1fr!important;gap:48px!important}}`}</style>

/* ── floating CTA ── */
function FCTA(){
  const[sh,setSh]=useState(false);
  useEffect(()=>{const h=()=>setSh(window.scrollY>600);window.addEventListener("scroll",h);return()=>window.removeEventListener("scroll",h)},[]);
  return<button onClick={()=>document.getElementById("contact")?.scrollIntoView({behavior:"smooth"})} style={{position:"fixed",bottom:32,right:32,zIndex:999,background:TERRA,color:"#fff",border:"none",padding:"16px 32px",fontSize:10,fontWeight:700,letterSpacing:3,textTransform:"uppercase",cursor:"pointer",fontFamily:"'Outfit'",borderRadius:100,boxShadow:"0 8px 30px rgba(193,127,90,0.4)",opacity:sh?1:0,transform:sh?"translateY(0)":"translateY(20px)",transition:"all 0.5s cubic-bezier(0.22,1,0.36,1)",pointerEvents:sh?"auto":"none"}} onMouseEnter={e=>e.target.style.transform="scale(1.05)"} onMouseLeave={e=>e.target.style.transform="scale(1)"}>Free Consult</button>
}
